<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kali Linux Web Terminal</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <style>
        body { background-color: #000; margin: 0; padding: 10px; height: 100vh; display: flex; flex-direction: column; }
        #terminal { flex-grow: 1; width: 100%; border: 1px solid #005f87; }
    </style>
</head>
<body>
    <div id="terminal"></div>
    <script>
        const term = new Terminal({ 
            cursorBlink: true, 
            fontSize: 14, 
            theme: { background: '#000000', foreground: '#ffffff' } 
        });
        term.open(document.getElementById('terminal'));

        // PENTING: Alamat IP laptop anda (172.20.22.104) supaya telefon boleh akses
        const socket = new WebSocket('ws://172.20.22.104:3000');

        socket.onopen = () => {
            term.writeln('\x1b[32m[SISTEM]\x1b[0m Berjaya disambungkan ke Kali Linux!');
            term.writeln('Sedia untuk digunakan...\r\n');
        };

        socket.onmessage = (event) => { 
            term.write(event.data); 
        };

        term.onData(data => { 
            socket.send(data); 
        });
        
        socket.onclose = () => {
            term.writeln('\n\r\x1b[31m[RALAT]\x1b[0m Sambungan Terputus. Pastikan "node server.js" berjalan.');
        };
    </script>
</body>
</html>
