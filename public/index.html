<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kali Linux Web Terminal - Local</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <style>
        body {
            background-color: #000;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #terminal {
            width: 100%;
            height: 90vh;
            border: 2px solid #005f87; /* Warna biru kegemaran anda */
        }
    </style>
</head>
<body>

    <div id="terminal"></div>

    <script>
        // 1. Inisialisasi xterm.js
        const term = new Terminal({
            cursorBlink: true,
            fontSize: 16,
            fontFamily: 'Courier New, monospace',
            theme: {
                background: '#000000',
                foreground: '#ffffff'
            }
        });
        term.open(document.getElementById('terminal'));

        // 2. Sambungkan ke WebSocket (Backend server.js Local)
        const socket = new WebSocket('ws://localhost:3000');

        socket.onopen = () => {
            term.writeln('\x1b[32m[SISTEM]\x1b[0m Berjaya disambungkan ke Kali Linux Local!');
            term.writeln('Sedia untuk digunakan...\r\n');
        };

        // 3. Terima data dari server (Bash) dan paparkan di terminal
        socket.onmessage = (event) => {
            term.write(event.data);
        };

        // 4. Hantar input dari keyboard ke server (Bash)
        term.onData(data => {
            socket.send(data);
        });

        socket.onclose = () => {
            term.writeln('\n\r\x1b[31m[RALAT]\x1b[0m Sesi Terputus. Pastikan "node server.js" sedang berjalan.');
        };

        socket.onerror = (error) => {
            console.error('WebSocket Error:', error);
        };
    </script>
</body>
</html>
